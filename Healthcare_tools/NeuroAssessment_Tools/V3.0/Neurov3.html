<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAssess — Clinical Assessment Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F1A;--surface:#131825;--surface2:#1A2035;--surface3:#212840;--border:#2A3150;
  --text:#E8ECF4;--text-dim:#8892B0;--text-muted:#5A6480;
  --accent-cranial:#38BDF8;--accent-ciwa:#F59E0B;--accent-nihss:#EF4444;--accent-derma:#22C55E;
  --accent-minds:#A78BFA;--accent-rass:#F472B6;--accent-cows:#FB923C;
  --accent-cranial-bg:rgba(56,189,248,0.08);--accent-ciwa-bg:rgba(245,158,11,0.08);
  --accent-nihss-bg:rgba(239,68,68,0.08);--accent-derma-bg:rgba(34,197,94,0.08);
  --accent-minds-bg:rgba(167,139,250,0.08);--accent-rass-bg:rgba(244,114,182,0.08);
  --accent-cows-bg:rgba(251,146,60,0.08);
  --radius:12px;--radius-sm:8px;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.app{max-width:960px;margin:0 auto;padding:20px 16px 100px;}

/* Header */
.header{text-align:center;padding:32px 0 24px;position:relative;}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--text-muted),transparent);}
.logo{font-family:var(--mono);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#E8ECF4 0%,#8892B0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Nav - scrollable row */
.nav-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:8px 0 12px;}
.nav{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:0 0 auto;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 10px 10px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative;overflow:hidden;
}
.nav-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--btn-accent);opacity:0;transition:opacity 0.2s;}
.nav-btn:hover{border-color:var(--btn-accent);transform:translateY(-1px);}
.nav-btn.active{background:var(--btn-bg);border-color:var(--btn-accent);box-shadow:0 0 20px var(--btn-bg);}
.nav-btn.active::before{opacity:1;}
.nav-btn .icon{font-size:18px;margin-bottom:3px;}
.nav-btn .label{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-dim);transition:color 0.2s;white-space:nowrap;}
.nav-btn.active .label{color:var(--btn-accent);}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.card:hover{border-color:var(--surface3);}
.card-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.card-header:hover{background:var(--surface2);}
.card-left{display:flex;align-items:center;gap:12px;flex:1;}
.card-num{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--section-accent);background:var(--section-bg);padding:4px 8px;border-radius:6px;min-width:36px;text-align:center;}
.card-title{font-weight:600;font-size:15px;line-height:1.3;}
.card-subtitle{font-size:12px;color:var(--text-dim);margin-top:1px;}
.card-status{font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:20px;margin-left:12px;white-space:nowrap;}
.card-status.pending{color:var(--text-muted);background:var(--surface2);}
.card-status.done{color:var(--section-accent);background:var(--section-bg);}
.chevron{color:var(--text-muted);transition:transform 0.25s;font-size:18px;margin-left:8px;}
.chevron.open{transform:rotate(180deg);}
.card-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
.card-body.open{max-height:2000px;}
.card-content{padding:0 18px 18px;border-top:1px solid var(--border);}

/* Info */
.test-info{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin:14px 0;font-size:13px;line-height:1.6;color:var(--text-dim);border-left:3px solid var(--section-accent);}
.test-info strong{color:var(--text);font-weight:500;}

/* Options */
.options{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text-dim);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all 0.15s;}
.opt-btn:hover{border-color:var(--section-accent);color:var(--text);background:var(--section-bg);}
.opt-btn.selected{background:var(--section-accent);color:var(--bg);border-color:var(--section-accent);font-weight:600;}

/* Score */
.score-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.score-label{font-size:13px;color:var(--text-dim);font-weight:500;}
.score-value{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--section-accent);}
.score-max{font-size:16px;color:var(--text-muted);font-weight:400;}
.score-interp{font-size:13px;color:var(--text-dim);margin-top:4px;padding:6px 12px;background:var(--section-bg);border-radius:6px;display:inline-block;}
.severity-bar-track{width:100%;height:6px;background:var(--surface3);border-radius:3px;margin:12px 0 6px;overflow:hidden;}
.severity-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease,background 0.3s;}

/* RASS special display */
.rass-display{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:center;}
.rass-score{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--section-accent);}
.rass-label{font-size:16px;font-weight:600;color:var(--text);margin-top:4px;}
.rass-desc{font-size:13px;color:var(--text-dim);margin-top:8px;}

/* Dermatome */
.derma-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.derma-level{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;}
.derma-level:hover{border-color:var(--accent-derma);}
.derma-level.intact{border-color:var(--accent-derma);background:rgba(34,197,94,0.06);}
.derma-level.impaired{border-color:var(--accent-ciwa);background:rgba(245,158,11,0.06);}
.derma-level.absent{border-color:var(--accent-nihss);background:rgba(239,68,68,0.06);}
.derma-label{font-family:var(--mono);font-size:13px;font-weight:500;}
.derma-status{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.derma-level.intact .derma-status{color:var(--accent-derma);}
.derma-level.impaired .derma-status{color:var(--accent-ciwa);}
.derma-level.absent .derma-status{color:var(--accent-nihss);}

/* Summary */
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:20px;}
.summary-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);}
.summary-text{font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text-dim);background:var(--surface2);border-radius:var(--radius-sm);padding:14px;white-space:pre-wrap;max-height:300px;overflow-y:auto;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.action-btn{background:var(--section-accent);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.action-btn:hover{opacity:0.85;}
.action-btn:active{transform:scale(0.97);}
.action-btn.secondary{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}

.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.section-header h2{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.section-badge{font-family:var(--mono);font-size:11px;color:var(--section-accent);background:var(--section-bg);padding:4px 10px;border-radius:20px;}
.region-group{margin-bottom:16px;}
.region-title{font-size:13px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:4px;}
.protocol-note{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;font-size:12px;line-height:1.7;color:var(--text-dim);}
.protocol-note strong{color:var(--text);}
.protocol-note .note-title{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--section-accent);margin-bottom:6px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 24px;font-size:13px;font-weight:500;color:var(--text);z-index:1000;opacity:0;transition:all 0.3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:600px){
  .derma-grid{grid-template-columns:1fr;}
  .score-bar{flex-direction:column;text-align:center;}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease forwards;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════

const CRANIAL_NERVES=[
  {num:"I",name:"Olfactory",fn:"Smell",test:"Identify familiar scents (coffee, vanilla, mint) with eyes closed, one nostril at a time. Avoid noxious stimuli (ammonia) — stimulates CN V.",opts:["Normal","Anosmia","Hyposmia","Not tested"]},
  {num:"II",name:"Optic",fn:"Visual acuity & fields",test:"Snellen chart for acuity. Confrontation fields — test each quadrant bilaterally. Pupillary light reflex (afferent). Fundoscopic for papilledema.",opts:["Normal","Decreased acuity","Field cut","Afferent pupil defect","Not tested"]},
  {num:"III",name:"Oculomotor",fn:"EOM (up/down/medial), pupil constriction, lid elevation",test:"Pupil size, shape, reactivity (efferent). H-pattern EOM. Check for ptosis. PERRLA.",opts:["Normal","Ptosis","Blown pupil","EOM deficit","Not tested"]},
  {num:"IV",name:"Trochlear",fn:"Downward/inward gaze (superior oblique)",test:"Look down and inward. Note head tilt compensation. Isolated CN IV palsy → vertical diplopia on downgaze.",opts:["Normal","Deficit","Head tilt","Not tested"]},
  {num:"V",name:"Trigeminal",fn:"Facial sensation (V1/V2/V3), mastication",test:"Light touch & pinprick in 3 divisions (forehead, cheek, jaw). Corneal reflex (afferent). Jaw clench strength.",opts:["Normal","Decreased V1","Decreased V2","Decreased V3","Absent corneal","Not tested"]},
  {num:"VI",name:"Abducens",fn:"Lateral gaze (lateral rectus)",test:"Look laterally. Deficit = inability to abduct eye. Most commonly affected CN (long intracranial course).",opts:["Normal","Deficit","Not tested"]},
  {num:"VII",name:"Facial",fn:"Facial expression, taste (anterior 2/3)",test:"Raise eyebrows, close eyes tightly, smile, puff cheeks. UMN = forehead sparing. LMN = entire side.",opts:["Normal","UMN pattern","LMN pattern","Not tested"]},
  {num:"VIII",name:"Vestibulocochlear",fn:"Hearing & balance",test:"Whisper test or finger rub each ear. Weber & Rinne tests. Assess nystagmus, gait stability.",opts:["Normal","Hearing loss R","Hearing loss L","Nystagmus","Not tested"]},
  {num:"IX",name:"Glossopharyngeal",fn:"Taste (posterior 1/3), pharyngeal sensation",test:"Tested with CN X — gag reflex (afferent = IX). Assess swallow.",opts:["Normal","Absent gag","Dysphagia","Not tested"]},
  {num:"X",name:"Vagus",fn:"Palate elevation, phonation",test:"Say 'ahh' — uvula deviates AWAY from lesion. Voice quality. Efferent gag reflex.",opts:["Normal","Uvula deviation","Hoarseness","Absent gag","Not tested"]},
  {num:"XI",name:"Accessory",fn:"SCM & trapezius",test:"Shrug shoulders against resistance (trapezius). Turn head against resistance (contralateral SCM).",opts:["Normal","Weak SCM","Weak trapezius","Not tested"]},
  {num:"XII",name:"Hypoglossal",fn:"Tongue movement",test:"Protrude tongue — deviates TOWARD lesion. Check for atrophy, fasciculations. Lateral push against cheek.",opts:["Normal","Deviation R","Deviation L","Atrophy/fascs","Not tested"]}
];

const CIWA_ITEMS=[
  {id:"nausea",name:"Nausea / Vomiting",desc:"'Do you feel sick to your stomach? Have you vomited?'",scale:[{val:0,label:"0 — None"},{val:1,label:"1 — Mild nausea, no vomiting"},{val:4,label:"4 — Intermittent nausea w/ dry heaves"},{val:7,label:"7 — Constant nausea, frequent vomiting"}]},
  {id:"tremor",name:"Tremor",desc:"Arms extended, fingers spread. Observe.",scale:[{val:0,label:"0 — No tremor"},{val:1,label:"1 — Not visible, felt fingertip to fingertip"},{val:4,label:"4 — Moderate, with arms extended"},{val:7,label:"7 — Severe, even arms not extended"}]},
  {id:"sweat",name:"Paroxysmal Sweats",desc:"Observation.",scale:[{val:0,label:"0 — No sweat"},{val:1,label:"1 — Barely perceptible, palms moist"},{val:4,label:"4 — Beads on forehead"},{val:7,label:"7 — Drenching sweats"}]},
  {id:"anxiety",name:"Anxiety",desc:"'Do you feel nervous?' Observe.",scale:[{val:0,label:"0 — No anxiety"},{val:1,label:"1 — Mildly anxious"},{val:4,label:"4 — Moderately anxious"},{val:7,label:"7 — Acute panic states"}]},
  {id:"agitation",name:"Agitation",desc:"Observe activity.",scale:[{val:0,label:"0 — Normal activity"},{val:1,label:"1 — Somewhat >normal"},{val:4,label:"4 — Moderately restless"},{val:7,label:"7 — Constantly thrashes"}]},
  {id:"tactile",name:"Tactile Disturbances",desc:"'Any itching, pins & needles, burning, numbness, or bugs crawling?'",scale:[{val:0,label:"0 — None"},{val:1,label:"1 — Mild"},{val:3,label:"3 — Moderate"},{val:4,label:"4 — Moderate hallucinations"},{val:5,label:"5 — Severe hallucinations"},{val:7,label:"7 — Continuous hallucinations"}]},
  {id:"auditory",name:"Auditory Disturbances",desc:"'Are sounds harsh? Frightening? Hear anything not there?'",scale:[{val:0,label:"0 — Not present"},{val:1,label:"1 — Mildly harsh"},{val:3,label:"3 — Moderately harsh"},{val:4,label:"4 — Moderate hallucinations"},{val:5,label:"5 — Severe hallucinations"},{val:7,label:"7 — Continuous hallucinations"}]},
  {id:"visual",name:"Visual Disturbances",desc:"'Is light too bright? Seeing anything disturbing not there?'",scale:[{val:0,label:"0 — Not present"},{val:1,label:"1 — Very mildly sensitive"},{val:3,label:"3 — Moderately sensitive"},{val:4,label:"4 — Moderate hallucinations"},{val:5,label:"5 — Severe hallucinations"},{val:7,label:"7 — Continuous hallucinations"}]},
  {id:"headache",name:"Headache / Fullness",desc:"'Does your head feel different? Band around your head?' (Not dizziness.)",scale:[{val:0,label:"0 — Not present"},{val:1,label:"1 — Very mild"},{val:3,label:"3 — Moderate"},{val:5,label:"5 — Severe"},{val:7,label:"7 — Extremely severe"}]},
  {id:"orient",name:"Orientation / Clouding",desc:"'What day is this? Where are you? Who am I?'",scale:[{val:0,label:"0 — Oriented, serial additions OK"},{val:1,label:"1 — Uncertain about date"},{val:2,label:"2 — Date uncertain >2 days"},{val:3,label:"3 — Disoriented date >2 days"},{val:4,label:"4 — Disoriented place/person"}]}
];

const NIHSS_ITEMS=[
  {id:"1a",name:"1a. Level of Consciousness",scale:[{val:0,label:"0 — Alert"},{val:1,label:"1 — Arousable by minor stimulation"},{val:2,label:"2 — Requires repeated stimulation"},{val:3,label:"3 — Unresponsive/reflexive only"}]},
  {id:"1b",name:"1b. LOC Questions (month, age)",scale:[{val:0,label:"0 — Both correct"},{val:1,label:"1 — One correct"},{val:2,label:"2 — Neither correct"}]},
  {id:"1c",name:"1c. LOC Commands (open/close, grip/release)",scale:[{val:0,label:"0 — Both correct"},{val:1,label:"1 — One correct"},{val:2,label:"2 — Neither correct"}]},
  {id:"2",name:"2. Best Gaze",scale:[{val:0,label:"0 — Normal"},{val:1,label:"1 — Partial gaze palsy"},{val:2,label:"2 — Forced deviation"}]},
  {id:"3",name:"3. Visual Fields",scale:[{val:0,label:"0 — No loss"},{val:1,label:"1 — Partial hemianopia"},{val:2,label:"2 — Complete hemianopia"},{val:3,label:"3 — Bilateral/blind"}]},
  {id:"4",name:"4. Facial Palsy",scale:[{val:0,label:"0 — Normal"},{val:1,label:"1 — Minor (flat nasolabial)"},{val:2,label:"2 — Partial (lower face)"},{val:3,label:"3 — Complete (upper+lower)"}]},
  {id:"5a",name:"5a. L Arm Motor (10s)",scale:[{val:0,label:"0 — No drift"},{val:1,label:"1 — Drift"},{val:2,label:"2 — Some effort vs gravity"},{val:3,label:"3 — No effort vs gravity"},{val:4,label:"4 — No movement"}]},
  {id:"5b",name:"5b. R Arm Motor (10s)",scale:[{val:0,label:"0 — No drift"},{val:1,label:"1 — Drift"},{val:2,label:"2 — Some effort vs gravity"},{val:3,label:"3 — No effort vs gravity"},{val:4,label:"4 — No movement"}]},
  {id:"6a",name:"6a. L Leg Motor (5s)",scale:[{val:0,label:"0 — No drift"},{val:1,label:"1 — Drift"},{val:2,label:"2 — Some effort vs gravity"},{val:3,label:"3 — No effort vs gravity"},{val:4,label:"4 — No movement"}]},
  {id:"6b",name:"6b. R Leg Motor (5s)",scale:[{val:0,label:"0 — No drift"},{val:1,label:"1 — Drift"},{val:2,label:"2 — Some effort vs gravity"},{val:3,label:"3 — No effort vs gravity"},{val:4,label:"4 — No movement"}]},
  {id:"7",name:"7. Limb Ataxia",scale:[{val:0,label:"0 — Absent"},{val:1,label:"1 — One limb"},{val:2,label:"2 — Two limbs"}]},
  {id:"8",name:"8. Sensory",scale:[{val:0,label:"0 — Normal"},{val:1,label:"1 — Mild-moderate loss"},{val:2,label:"2 — Severe/total loss"}]},
  {id:"9",name:"9. Best Language",scale:[{val:0,label:"0 — No aphasia"},{val:1,label:"1 — Mild-moderate"},{val:2,label:"2 — Severe"},{val:3,label:"3 — Mute/global"}]},
  {id:"10",name:"10. Dysarthria",scale:[{val:0,label:"0 — Normal"},{val:1,label:"1 — Mild-moderate slurring"},{val:2,label:"2 — Unintelligible/mute"}]},
  {id:"11",name:"11. Extinction/Inattention",scale:[{val:0,label:"0 — None"},{val:1,label:"1 — One modality"},{val:2,label:"2 — Profound/>1 modality"}]}
];

const DERMATOMES={
  "Cervical":[{level:"C2",area:"Occiput/posterior scalp"},{level:"C3",area:"Neck, posterior"},{level:"C4",area:"Shoulder top/upper deltoid"},{level:"C5",area:"Lateral arm (deltoid)"},{level:"C6",area:"Lateral forearm, thumb, index"},{level:"C7",area:"Middle finger, posterior forearm"},{level:"C8",area:"Ring & little finger, medial forearm"}],
  "Thoracic":[{level:"T1",area:"Medial forearm"},{level:"T2",area:"Axilla/medial arm"},{level:"T4",area:"Nipple line"},{level:"T6",area:"Xiphoid process"},{level:"T10",area:"Umbilicus"},{level:"T12",area:"Inguinal/suprapubic"}],
  "Lumbar":[{level:"L1",area:"Inguinal region"},{level:"L2",area:"Anterior thigh, upper"},{level:"L3",area:"Anterior thigh to knee"},{level:"L4",area:"Medial leg, medial malleolus"},{level:"L5",area:"Lateral leg, dorsum foot, great toe"}],
  "Sacral":[{level:"S1",area:"Lateral foot, sole, little toe"},{level:"S2",area:"Posterior thigh"},{level:"S3",area:"Medial buttock"},{level:"S4-S5",area:"Perianal area"}]
};

const MINDS_ITEMS=[
  {id:"pulse",name:"Pulse",desc:"Assess resting heart rate.",scale:[{val:0,label:"0 — ≤100 bpm"},{val:1,label:"1 — 101–110"},{val:2,label:"2 — 111–120"},{val:3,label:"3 — 121–130"},{val:4,label:"4 — 131–140"},{val:5,label:"5 — >140 bpm"}]},
  {id:"dbp",name:"Diastolic BP",desc:"Assess diastolic blood pressure.",scale:[{val:0,label:"0 — ≤95 mmHg"},{val:1,label:"1 — 96–100"},{val:2,label:"2 — 101–105"},{val:3,label:"3 — 106–110"},{val:4,label:"4 — 111–115"},{val:5,label:"5 — >115 mmHg"}]},
  {id:"temp",name:"Temperature",desc:"Assess body temperature. Rule out infection.",scale:[{val:0,label:"0 — ≤99.0°F"},{val:1,label:"1 — 99.1–99.4°F"},{val:2,label:"2 — 99.5–99.9°F"},{val:3,label:"3 — 100.0–100.3°F"},{val:5,label:"5 — ≥100.4°F"}]},
  {id:"sweat",name:"Diaphoresis",desc:"Observe for sweating — do not ask.",scale:[{val:0,label:"0 — None"},{val:1,label:"1 — Palms moist"},{val:3,label:"3 — Palms & forehead"},{val:5,label:"5 — Drenching"}]},
  {id:"tremor",name:"Tremor",desc:"Arms extended, fingers spread. Observe visibility.",scale:[{val:0,label:"0 — None"},{val:1,label:"1 — Mild (felt, not visible)"},{val:3,label:"3 — Moderate (visible extended)"},{val:5,label:"5 — Severe (visible at rest)"}]},
  {id:"agitation",name:"Agitation",desc:"Observe activity. Correlate with RASS if available.",scale:[{val:0,label:"0 — Calm, cooperative"},{val:1,label:"1 — Restless, redirectable"},{val:3,label:"3 — Purposeless movement, pulling lines"},{val:5,label:"5 — Combative, danger to self/staff"}]},

let S={tab:'cranial',cranial:{},cranialOpen:{},ciwa:{},ciwaOpen:{},nihss:{},nihssOpen:{},derma:{},minds:{},mindsOpen:{},rass:null,cows:{},cowsOpen:{}};

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function ts(){return new Date().toLocaleString('en-US',{dateStyle:'short',timeStyle:'short'});}
function dermaNext(c){if(!c)return'intact';if(c==='intact')return'impaired';if(c==='impaired')return'absent';return undefined;}

function ciwaInterp(s){
  if(s<=8)return{text:"Mild withdrawal — may not require medication",color:"#22C55E"};
  if(s<=15)return{text:"Moderate withdrawal — medical management",color:"#F59E0B"};
  if(s<=20)return{text:"Severe withdrawal — treatment indicated",color:"#F97316"};
  return{text:"Very severe — ICU-level care",color:"#EF4444"};
}
function nihssInterp(s){
  if(s===0)return{text:"No stroke symptoms",color:"#22C55E"};
  if(s<=4)return{text:"Minor stroke",color:"#22C55E"};
  if(s<=15)return{text:"Moderate stroke",color:"#F59E0B"};
  if(s<=20)return{text:"Moderate-severe stroke",color:"#F97316"};
  return{text:"Severe stroke",color:"#EF4444"};
}
function mindsInterp(s){
  if(s<=7)return{text:"Mild — assess q2h, PRN benzos",color:"#22C55E"};
  if(s<=15)return{text:"Moderate — assess q1h, symptom-triggered tx",color:"#F59E0B"};
  if(s<=25)return{text:"Severe — assess q20min, aggressive tx, consider ICU",color:"#F97316"};
  return{text:"Very severe — ICU monitoring required",color:"#EF4444"};
}
function rassInterp(v){
  if(v>=2)return{text:"Agitated — consider cause, may need intervention",color:"#EF4444"};
  if(v===1)return{text:"Restless — monitor",color:"#F59E0B"};
  if(v===0)return{text:"Alert and calm — target for most patients",color:"#22C55E"};
  if(v>=-2)return{text:"Light sedation",color:"#38BDF8"};
  if(v===-3)return{text:"Moderate sedation",color:"#A78BFA"};
  return{text:"Deep sedation / unarousable",color:"#F472B6"};
}
function cowsInterp(s){
  if(s<=4)return{text:"No/minimal withdrawal",color:"#22C55E"};
  if(s<=12)return{text:"Mild withdrawal",color:"#F59E0B"};
  if(s<=24)return{text:"Moderate withdrawal",color:"#F97316"};
  if(s<=36)return{text:"Moderately severe withdrawal",color:"#EF4444"};
  return{text:"Severe withdrawal",color:"#EF4444"};
}

function render(){
  document.getElementById('app').innerHTML=renderHeader()+renderNav()+renderContent();
  attachEvents();
}

function renderHeader(){
  return `<div class="header"><div class="logo">NeuroAssess</div><h1>Clinical Assessment Tool</h1></div>`;
}

function renderNav(){
  const tabs=[
    {id:'cranial',icon:'🧠',label:'Cranial N.',a:'var(--accent-cranial)',bg:'var(--accent-cranial-bg)'},
    {id:'nihss',icon:'⚡',label:'NIHSS',a:'var(--accent-nihss)',bg:'var(--accent-nihss-bg)'},
    {id:'derma',icon:'🦴',label:'Dermatomes',a:'var(--accent-derma)',bg:'var(--accent-derma-bg)'},
    {id:'rass',icon:'😴',label:'RASS',a:'var(--accent-rass)',bg:'var(--accent-rass-bg)'},
    {id:'ciwa',icon:'📋',label:'CIWA-Ar',a:'var(--accent-ciwa)',bg:'var(--accent-ciwa-bg)'},

function renderContent(){
  const ac={
    cranial:{a:'var(--accent-cranial)',bg:'var(--accent-cranial-bg)'},
    ciwa:{a:'var(--accent-ciwa)',bg:'var(--accent-ciwa-bg)'},
    minds:{a:'var(--accent-minds)',bg:'var(--accent-minds-bg)'},
    nihss:{a:'var(--accent-nihss)',bg:'var(--accent-nihss-bg)'},

// ── Generic scored renderer ──
function renderScored(cfg){
  const{title,badge,items,sk,ok,max,interp,da,note}=cfg;
  const score=Object.values(S[sk]).reduce((a,b)=>a+b,0);
  const ans=Object.keys(S[sk]).length;
  const ip=interp(score);
  const pct=Math.min(100,(score/max)*100);
  let h=`<div class="section-header"><h2>${title}</h2><span class="section-badge">${ans}/${items.length} scored</span></div>`;
  if(note)h+=note;
  h+=`<div class="score-bar"><div><div class="score-label">Total ${badge} Score</div><div class="score-value">${score}<span class="score-max"> / ${max}</span></div><div class="severity-bar-track"><div class="severity-bar-fill" style="width:${pct}%;background:${ip.color}"></div></div></div><div class="score-interp" style="color:${ip.color}">${ip.text}</div></div>`;
  h+=items.map(item=>{
    const isOpen=S[ok]?.[item.id];const val=S[sk][item.id];
    return `<div class="card"><div class="card-header" data-toggle="${da}-${item.id}"><div class="card-left"><div><div class="card-title">${item.name}</div></div></div>${val!==undefined?`<span class="card-status done">${val}</span>`:`<span class="card-status pending">—</span>`}<span class="chevron ${isOpen?'open':''}">▾</span></div><div class="card-body ${isOpen?'open':''}"><div class="card-content">${item.desc?`<div class="test-info">${item.desc}</div>`:''}<div class="options">${item.scale.map(s=>`<button class="opt-btn ${val===s.val?'selected':''}" data-${da}="${item.id}" data-val="${s.val}">${s.label}</button>`).join('')}</div></div></div></div>`;
  }).join('');
  return{html:h,score,ans,interp:ip};
}

function summary(lines){
  return `<div class="summary-box"><h3>Documentation</h3><div class="summary-text">${lines.join('\n')}</div><div class="btn-row"><button class="action-btn" onclick="copyText(this)">Copy to Clipboard</button><button class="action-btn secondary" onclick="clearSection('${S.tab}')">Reset</button></div></div>`;
}

// ── Cranial ──
function renderCranial(){
  const ans=Object.keys(S.cranial).length;
  let h=`<div class="section-header"><h2>Cranial Nerve Exam</h2><span class="section-badge">${ans}/12</span></div>`;
  h+=CRANIAL_NERVES.map(cn=>{
    const o=S.cranialOpen[cn.num],v=S.cranial[cn.num];
    return `<div class="card"><div class="card-header" data-toggle="cranial-${cn.num}"><div class="card-left"><span class="card-num">CN ${cn.num}</span><div><div class="card-title">${cn.name}</div><div class="card-subtitle">${cn.fn}</div></div></div>${v?`<span class="card-status done">${v}</span>`:`<span class="card-status pending">—</span>`}<span class="chevron ${o?'open':''}">▾</span></div><div class="card-body ${o?'open':''}"><div class="card-content"><div class="test-info"><strong>Assessment:</strong> ${cn.test}</div><div class="options">${cn.opts.map(op=>`<button class="opt-btn ${v===op?'selected':''}" data-cranial="${cn.num}" data-val="${op}">${op}</button>`).join('')}</div></div></div></div>`;
  }).join('');
  if(ans>0){
    let l=[`CRANIAL NERVE EXAM — ${ts()}\n`];
    CRANIAL_NERVES.forEach(cn=>{const v=S.cranial[cn.num];if(v)l.push(`CN ${cn.num.padEnd(4)} ${cn.name.padEnd(18)} ${v}`);});
    const abn=CRANIAL_NERVES.filter(cn=>S.cranial[cn.num]&&S.cranial[cn.num]!=='Normal'&&S.cranial[cn.num]!=='Not tested');
    if(abn.length>0){l.push(`\nABNORMAL:`);abn.forEach(cn=>l.push(`  CN ${cn.num} (${cn.name}): ${S.cranial[cn.num]}`));}
    else if(ans===12)l.push(`\nAll cranial nerves intact.`);
    h+=summary(l);
  }
  return h;
}

// ── CIWA ──
function renderCIWA(){
  const r=renderScored({title:"CIWA-Ar Protocol",badge:"CIWA-Ar",items:CIWA_ITEMS,sk:"ciwa",ok:"ciwaOpen",max:67,interp:ciwaInterp,da:"ciwa"});
  let h=r.html;
  if(r.ans>0){let l=[`CIWA-Ar — ${ts()}\n`];CIWA_ITEMS.forEach(i=>{const v=S.ciwa[i.id];if(v!==undefined)l.push(`${i.name.padEnd(35)} ${v}`);});l.push(`\nTOTAL: ${r.score}/67`);l.push(`${r.interp.text}`);h+=summary(l);}
  return h;
}

// ── mMINDS ──
function renderMINDS(){
  const note=`<div class="protocol-note"><div class="note-title">mMINDS Protocol</div><strong>Modified Minnesota Detoxification Scale</strong> — 9-item objective tool for alcohol withdrawal. Designed for ICU patients where CIWA-Ar is unreliable (intubated, delirious, nonverbal).<br><br><strong>Advantage:</strong> No patient participation needed. Objective signs (vitals, tremor, diaphoresis) over subjective symptoms.<br><strong>Reassessment:</strong> Mild (≤7) → q2h | Moderate (8–15) → q1h | Severe (16+) → q20min<br><strong>Note:</strong> Rule out other causes (sepsis, hypoxia, pain). Score 0 if unable to assess due to sedation/ventilation. Benzos before neuroleptics. Thiamine before dextrose.</div>`;
  const r=renderScored({title:"mMINDS Protocol",badge:"mMINDS",items:MINDS_ITEMS,sk:"minds",ok:"mindsOpen",max:46,interp:mindsInterp,da:"minds",note});
  let h=r.html;
  if(r.ans>0){
    let l=[`mMINDS — ${ts()}\n`];MINDS_ITEMS.forEach(i=>{const v=S.minds[i.id];if(v!==undefined)l.push(`${i.name.padEnd(30)} ${v}`);});
    l.push(`\nTOTAL: ${r.score}/46 — ${r.interp.text}`);
    const f=r.score<=7?"q2h":r.score<=15?"q1h":"q20min";l.push(`Reassess: ${f}`);
    if(S.minds.seizure===5)l.push(`⚠ SEIZURE — evaluate ICU transfer.`);
    if(r.score>15)l.push(`⚠ Aggressive benzo tx + ICU monitoring.`);
    h+=summary(l);
  }
  return h;
}

// ── NIHSS ──
function renderNIHSS(){
  const r=renderScored({title:"NIH Stroke Scale",badge:"NIHSS",items:NIHSS_ITEMS,sk:"nihss",ok:"nihssOpen",max:42,interp:nihssInterp,da:"nihss"});
  let h=r.html;
  if(r.ans>0){
    let l=[`NIHSS — ${ts()}\n`];NIHSS_ITEMS.forEach(i=>{const v=S.nihss[i.id];if(v!==undefined)l.push(`${i.name.padEnd(40)} ${v}`);});
    l.push(`\nTOTAL: ${r.score}/42 — ${r.interp.text}`);
    if(r.score>=6)l.push(`⚠ Consider tPA if within window.`);
    h+=summary(l);
  }
  return h;
}

// ── RASS ──
function renderRASS(){
  const v=S.rass;
  const ip=v!==null?rassInterp(v):null;
  let h=`<div class="section-header"><h2>Richmond Agitation-Sedation Scale</h2><span class="section-badge">${v!==null?'Scored':'Pending'}</span></div>`;
  h+=`<div class="protocol-note"><div class="note-title">About RASS</div><strong>Richmond Agitation-Sedation Scale</strong> — A 10-point scale from -5 to +4 used to assess level of sedation/agitation in ICU patients.<br><br><strong>Step 1:</strong> Observe patient — is patient alert, restless, or agitated? (+1 to +4)<br><strong>Step 2:</strong> If not alert, call patient's name and ask to open eyes / look at speaker.<br>&nbsp;&nbsp;• Eye opening + eye contact sustained >10s → <strong>-1</strong><br>&nbsp;&nbsp;• Eye opening + eye contact but not sustained → <strong>-2</strong><br>&nbsp;&nbsp;• Any movement to voice but no eye contact → <strong>-3</strong><br><strong>Step 3:</strong> If no response to voice, physically stimulate (shoulder shake, sternal rub).<br>&nbsp;&nbsp;• Any movement to physical stimulation → <strong>-4</strong><br>&nbsp;&nbsp;• No response → <strong>-5</strong><br><br><strong>Target:</strong> 0 (alert & calm) for most patients. -1 to -2 may be acceptable for ventilated patients per sedation protocol.</div>`;

  if(v!==null){
    const item=RASS_ITEMS.find(r=>r.val===v);
    h+=`<div class="rass-display"><div class="rass-score">${v>0?'+'+v:v}</div><div class="rass-label">${item.label}</div><div class="rass-desc">${item.desc}</div><div class="score-interp" style="color:${ip.color};margin-top:12px">${ip.text}</div></div>`;
  }

  h+=`<div style="display:flex;flex-direction:column;gap:6px;">`;
  RASS_ITEMS.forEach(r=>{
    const sel=v===r.val;
    h+=`<button class="opt-btn ${sel?'selected':''}" data-rass="${r.val}" style="text-align:left;padding:12px 16px;${sel?'':''}"><strong>${r.val>0?'+'+r.val:r.val}</strong> &nbsp;${r.label.split(' ').slice(1).join(' ')}<br><span style="font-size:12px;opacity:0.7">${r.desc}</span></button>`;
  });
  h+=`</div>`;

  if(v!==null){
    const item=RASS_ITEMS.find(r=>r.val===v);
    let l=[`RASS — ${ts()}\n`,`Score: ${v>0?'+'+v:v}`,`Level: ${item.label}`,`${item.desc}`,`\n${ip.text}`];
    h+=summary(l);
  }
  return h;
}

// ── COWS ──
function renderCOWS(){
  const note=`<div class="protocol-note"><div class="note-title">COWS Protocol</div><strong>Clinical Opiate Withdrawal Scale</strong> — 11-item scale to quantify opioid withdrawal severity. Used to guide buprenorphine/Suboxone induction timing.<br><br><strong>Scoring:</strong> ≤4 No withdrawal | 5–12 Mild | 13–24 Moderate | 25–36 Moderately severe | >36 Severe<br><strong>Buprenorphine induction:</strong> Generally initiated when COWS ≥8–12 (mild-moderate withdrawal) to avoid precipitated withdrawal.<br><strong>Reassess:</strong> q30min–1h during induction. Score before each dose.</div>`;
  const r=renderScored({title:"Clinical Opiate Withdrawal Scale",badge:"COWS",items:COWS_ITEMS,sk:"cows",ok:"cowsOpen",max:47,interp:cowsInterp,da:"cows",note});
  let h=r.html;
  if(r.ans>0){
    let l=[`COWS — ${ts()}\n`];COWS_ITEMS.forEach(i=>{const v=S.cows[i.id];if(v!==undefined)l.push(`${i.name.padEnd(30)} ${v}`);});
    l.push(`\nTOTAL: ${r.score}/47 — ${r.interp.text}`);
    if(r.score>=8&&r.score<=12)l.push(`→ Consider buprenorphine induction.`);
    if(r.score>12)l.push(`→ Buprenorphine induction appropriate.`);
    h+=summary(l);
  }
  return h;
}

// ── Dermatomes ──
function renderDerma(){
  const total=Object.values(DERMATOMES).flat().length;const assessed=Object.keys(S.derma).length;
  let h=`<div class="section-header"><h2>Dermatome Assessment</h2><span class="section-badge">${assessed}/${total}</span></div>
    <div class="test-info" style="margin-bottom:16px;border-left-color:var(--accent-derma)"><strong>Tap to cycle:</strong> <strong style="color:var(--accent-derma)">Intact</strong> → <strong style="color:var(--accent-ciwa)">Impaired</strong> → <strong style="color:var(--accent-nihss)">Absent</strong> → Clear. Test light touch and pinprick bilaterally, distal to proximal.</div>`;
  Object.entries(DERMATOMES).forEach(([reg,levels])=>{
    h+=`<div class="region-group"><div class="region-title">${reg}</div><div class="derma-grid">${levels.map(l=>{const s=S.derma[l.level]||'';return `<div class="derma-level ${s}" data-derma="${l.level}"><div><div class="derma-label">${l.level}</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">${l.area}</div></div><div class="derma-status">${s||'—'}</div></div>`;}).join('')}</div></div>`;
  });
  if(assessed>0){
    let l=[`DERMATOME — ${ts()}\n`];const imp=[],abs=[];
    Object.entries(DERMATOMES).forEach(([reg,levels])=>{let rl=[];levels.forEach(lv=>{const s=S.derma[lv.level];if(s){rl.push(`  ${lv.level.padEnd(8)} ${lv.area.padEnd(35)} ${s.toUpperCase()}`);if(s==='impaired')imp.push(lv.level);if(s==='absent')abs.push(lv.level);}});if(rl.length>0){l.push(`${reg}:`);l.push(...rl);}});
    if(imp.length>0)l.push(`\nIMPAIRED: ${imp.join(', ')}`);
    if(abs.length>0)l.push(`ABSENT: ${abs.join(', ')}`);
    if(!imp.length&&!abs.length)l.push(`\nAll tested intact.`);
    h+=summary(l);
  }
  return h;
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
function attachEvents(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));
  document.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>{const p=el.dataset.toggle.split(/-(.+)/);const k=p[0]+'Open';if(!S[k])S[k]={};S[k][p[1]]=!S[k][p[1]];render();}));
  document.querySelectorAll('[data-cranial]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S.cranial[b.dataset.cranial]=b.dataset.val;render();}));
  ['ciwa','nihss','minds','cows'].forEach(da=>{
    document.querySelectorAll(`[data-${da}]`).forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S[da][b.dataset[da]]=parseInt(b.dataset.val);render();}));
  });
  document.querySelectorAll('[data-rass]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();S.rass=parseInt(b.dataset.rass);render();}));
  document.querySelectorAll('[data-derma]').forEach(el=>el.addEventListener('click',()=>{const l=el.dataset.derma,n=dermaNext(S.derma[l]);if(n)S.derma[l]=n;else delete S.derma[l];render();}));
}

// ═══════════════════════════════════════════════════
// GLOBAL
// ═══════════════════════════════════════════════════
window.copyText=function(btn){navigator.clipboard.writeText(btn.closest('.summary-box').querySelector('.summary-text').textContent).then(()=>toast('Copied to clipboard'));};
window.clearSection=function(sec){
  if(sec==='cranial'){S.cranial={};S.cranialOpen={};}
  if(sec==='ciwa'){S.ciwa={};S.ciwaOpen={};}
  if(sec==='minds'){S.minds={};S.mindsOpen={};}
  if(sec==='nihss'){S.nihss={};S.nihssOpen={};}
  if(sec==='derma')S.derma={};
  if(sec==='rass')S.rass=null;
  if(sec==='cows'){S.cows={};S.cowsOpen={};}
  render();toast('Reset');
};

render();
</script>
</body>
</html>
